schema_version: "1.0"

extension:
  id: "m365"
  name: "Microsoft 365 Integration"
  version: "1.0.0"
  description: "Fetch Microsoft 365 content and normalize it to Markdown for later spec generation with Spec Kit presets."
  author: "spec-kit-m365"
  repository: "https://github.com/spec-kit-m365/spec-kit-m365"
  license: "MIT"
  homepage: "https://github.com/spec-kit-m365/spec-kit-m365"

requires:
  speckit_version: ">=0.1.0"
  tools:
    - name: "m365"
      version: ">=9.0.0"
      required: true
      description: "CLI for Microsoft 365 — used for Teams message and meeting transcript retrieval"

  # Delegated permissions required on the Entra ID app registration.
  # Thread command (minimum): User.Read, Team.ReadBasic.All, Channel.ReadBasic.All,
  #   ChannelMessage.Read.All, TeamMember.Read.All
  # Meeting command (additional): Calendars.Read, OnlineMeetingTranscript.Read.All
  # Note: Meeting discovery requires an Exchange Online mailbox on the user's account.
  # All permissions require admin consent.

provides:
  commands:
    - name: "speckit.m365.setup"
      file: "commands/setup.md"
      description: "Set up the spec-kit-m365 extension — verify prerequisites, configure authentication, and create your m365-config.yml"
      aliases: ["speckit.setup.m365"]

    - name: "speckit.m365.fetch-message"
      file: "commands/fetch-message.md"
      description: "Fetch a Teams channel message thread (or email) and save it as Markdown in the spec directory"
      aliases: ["speckit.fetch-message"]

    - name: "speckit.m365.fetch-file"
      file: "commands/fetch-file.md"
      description: "Fetch a SharePoint or OneDrive file, convert to Markdown when needed, and save it in the spec directory"
      aliases: ["speckit.fetch-file"]

    - name: "speckit.m365.fetch-transcript"
      file: "commands/fetch-transcript.md"
      description: "Fetch a Teams meeting transcript and save it as Markdown in the spec directory"
      aliases: ["speckit.fetch-transcript"]

  config:
    - name: "m365-config.yml"
      template: "m365-config.template.yml"
      description: "Microsoft 365 integration configuration — Teams organization, default channels, and output settings"
      required: false

tags:
  - "microsoft-365"
  - "teams"
  - "meetings"
  - "transcripts"
  - "collaboration"
  - "extraction"
  - "ingestion"
